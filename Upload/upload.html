<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Must Material</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="../style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
   <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body {
      background: var(--background-tertiary);
      margin: 0;
    }

    /* Styles for the new Tab Buttons */
    .tab-controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
    }
    
    .tab-btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: 1px solid var(--c-glass-border, #ccc);
      background: transparent;
      color: var(--text-secondary, #666);
      font-family: 'DM Sans', sans-serif;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    /* Active tab style */
    .tab-btn.active {
      background: var(--c-glass, rgba(255,255,255,0.1));
      color: var(--text-color); /* Change this to match your theme's primary color */
      border-color:  var(--text-color);
    }
    #up-detail{
      padding:12px;border-radius:8px;background:var(--c-glass);border:1px solid var(--border-color);color:var(--text-secondary);font-family:'DM Sans',sans-serif;
    }
    #up-subject:focus-within,#up-detail:focus-within { border-color: var(--text-color) }
    .data-type{
    background: var(--c-glass);color: var(--text-secondary);padding: 4px 8px; border-radius: 4px; font-size: 11px; text-transform: uppercase;}
    .item{
      color: var(--text-color);
    }
  </style>
</head>

<body class="light-theme">
<section class="sec1">
  <nav class="nav-bar">
    <div class="logo">
      <a onclick="history.back()"><img src="../assets/logo.png" alt="Must Material"></a>
    </div>
    <div class="nav-btns">
      <button onclick="switchTheme()"><i class="fa-solid fa-moon theme-icon"></i></button>
    </div>
  </nav>
</section>

<section style="min-height: 90vh; height: 100%; padding: 40px 20px;">

  <div class="tab-controls">
    <button id="btn-upload" class="tab-btn active" onclick="openTab('upload')">Upload Resource</button>
    <button id="btn-browse" class="tab-btn" onclick="openTab('browse')">Browse Materials</button>
  </div>

  <div id="tab-upload" style="display: block; text-align:center;">
    <div style="max-width:500px;margin:0 auto">
      <div style="font-size:48px;margin-bottom:20px;">📤</div>
      <h2 style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:12px;color: var(--text-color);">Upload a Resource</h2>
      <p style="font-size:14px;color:var(--c-muted);margin-bottom:32px;color: var(--text-secondary)">Share notes, PYQs, or syllabi. All uploads are reviewed by our moderation team before going live.</p>
      
      <form id="upload-form" style="display:flex;flex-direction:column;gap:16px;text-align:left;">
          <input type="text" id="up-subject" placeholder="Resource Title (e.g., OS Notes)" required style="padding:12px;border-radius:8px;background:var(--c-glass);border:1px solid var(--border-color);color:var(--text-secondary);font-family:'DM Sans',sans-serif;">
          
          <input type="text" id="up-detail" placeholder="Details (e.g., B.Tech · CSE · Sem 1)">
          
          <select id="up-type" required style="padding:12px;border-radius:8px;background:#080c18;border:1px solid var(--c-glass-border);color:white;font-family:'DM Sans',sans-serif;">
              <option value="Material">Material</option>
              <option value="Manual">Manual</option>
              <option value="syllabus">Syllabus</option>
              <option value="pdf">PDF</option>
              <option value="Notes">Notes</option>
          </select>

          <div class="box">
            <label for="fileInput" class="upload-box" title="Click to choose files">
              <div class="upload-inside">
                <span class="material-symbols-outlined">upload</span>
                <div class="item"style="font-size:14px;color: var(--text-secondary)">Click to select PDFs</div>
              </div>
            </label>
          </div>

          <input id="fileInput" type="file" accept="application/pdf" multiple style="display:none" />
          
          <button type="submit" class="cta-primary" style="width:100%;padding:13px;">Submit Resource</button>
      </form>
    </div>
  </div>

  <div id="tab-browse" style="display: none; max-width: 600px; margin: 0 auto;">
    <h2 style="font-family:'Syne',sans-serif;font-weight:800;" class="mb-3 text-center text-xl text-[var(--text-color)]">Community Resources</h2>
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:32px;text-align:center;">Find notes, syllabi, and PYQs uploaded by others.</p>
    
    <div id="materials-list" class="resource-grid" style="">
        </div>
  </div>

  <div id="thankyouPopup" role="status" aria-hidden="true" style="display:none; position:fixed; bottom:20px; right:20px; background:#4CAF50; color:white; padding:15px; border-radius:8px; z-index:1000;">
    <div class="content">
      <div class="title" style="font-weight:bold;">Thank you!</div>
      <div class="subtitle" id="thankSubtitle">Your file(s) were uploaded successfully.</div>
    </div>
  </div>
</section>

<footer class="sec-5" id="footer"></footer>

<script>
  function openTab(tabName) {
    // Hide all tabs
    document.getElementById('tab-upload').style.display = 'none';
    document.getElementById('tab-browse').style.display = 'none';
    
    // Remove active class from all buttons
    document.getElementById('btn-upload').classList.remove('active');
    document.getElementById('btn-browse').classList.remove('active');
    
    // Show the selected tab and add active class to its button
    document.getElementById('tab-' + tabName).style.display = 'block';
    document.getElementById('btn-' + tabName).classList.add('active');
  }
</script>

<script type="module" src="upload.js"></script>
<script src="../components/components.js"></script>
<script src="../main.js"></script>

</body>
</html>
